name: Release Python Package

on:
  # Automatic: every published GitHub release.
  release:
    types: [published]

  # Manual: trigger from the Actions tab or `gh workflow run`.
  # Defaults to a build-and-test dry run so an accidental click does not
  # publish — flip the checkbox (or pass `--field publish_to_pypi=true`) to
  # actually push to PyPI.
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish to PyPI after a successful build (off = dry run: build + test only)"
        type: boolean
        required: true
        default: false

permissions:
  contents: read

# Force JS actions to run on Node.js 24 (the current runtime since June 16, 2026).
# Belt-and-suspenders alongside the v5 / v6 action bumps below: silences the
# Node-20 deprecation warning even if any action's manifest still declares Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install build

      - name: Run tests
        working-directory: bbsctl
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q --deselect tests/test_doc_links.py

      - name: Build release distributions
        working-directory: bbsctl
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: release-dists
          path: bbsctl/dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    # Skip the publish job entirely on a dry-run manual dispatch.
    # Release-triggered runs always publish; workflow_dispatch publishes only
    # when the `publish_to_pypi` input is true.
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_to_pypi == 'true')
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/p/bbsctl

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
